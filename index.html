<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐸</text></svg>"
    />
    <title>Lily Hopper — a pond at dusk</title>
  </head>
  <body class="overflow-hidden bg-[#141026]">
    <canvas id="pond" class="fixed inset-0 h-full w-full"></canvas>

    <header class="pointer-events-none fixed left-6 top-5 select-none">
      <h1
        class="font-display text-4xl italic font-semibold text-amber-50/95 [text-shadow:0_2px_18px_rgba(20,10,40,0.55)]"
      >
        Lily Hopper
      </h1>
      <p class="mt-1 max-w-xs text-[13px] leading-snug tracking-wide text-amber-100/65">
        click a lily pad to hop — or tap the open water and watch the ripples
        cross
      </p>
    </header>

    <aside
      class="fixed bottom-5 left-5 w-60 select-none space-y-3.5 rounded-2xl border border-white/15 bg-[#1a1430]/40 p-4 text-amber-50 shadow-2xl shadow-black/30 backdrop-blur-md"
    >
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-amber-100/80"
          >Rain</span
        >
        <button id="rainBtn" class="toggle" aria-pressed="false" aria-label="Toggle rain"></button>
      </div>

      <div class="flex items-center justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-amber-100/80"
          >Sound</span
        >
        <button id="soundBtn" class="toggle" aria-pressed="true" aria-label="Toggle sound"></button>
      </div>

      <label class="block">
        <span
          class="mb-1.5 flex justify-between text-[11px] font-semibold uppercase tracking-[0.14em] text-amber-100/80"
          ><span>Water</span><span class="normal-case tracking-normal text-amber-100/50">calm ↔ lively</span></span
        >
        <input id="dampSlider" type="range" min="0" max="100" value="72" class="slider" />
      </label>

      <label class="block">
        <span
          class="mb-1.5 flex justify-between text-[11px] font-semibold uppercase tracking-[0.14em] text-amber-100/80"
          ><span>Splash</span><span class="normal-case tracking-normal text-amber-100/50">gentle ↔ mighty</span></span
        >
        <input id="powerSlider" type="range" min="0" max="100" value="50" class="slider" />
      </label>

      <button
        id="resetBtn"
        class="w-full rounded-lg border border-white/10 bg-white/10 py-1.5 text-[13px] tracking-wide text-amber-50/90 transition-colors hover:bg-white/20 active:bg-white/25"
      >
        still the water
      </button>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
